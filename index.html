<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Udemy Clone</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Udemy Clone</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Topics</a>
        <a href="#">Courses</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>Learn Anything, Anytime</h2>
    <input type="text" placeholder="Search Courses">
</section>

<section class="topics">
    <h2>Topics</h2>
    <div class="topic-list">
        <div>Web Development</div>
        <div>Python</div>
        <div>Java</div>
        <div>Data Science</div>
        <div>UI/UX</div>
        <div>Machine Learning</div>
    </div>
</section>

<section class="courses">
    <h2>Popular Courses</h2>

    <div class="card">
    <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=300&h=200&fit=crop" alt="HTML & CSS Course">
    <h3>HTML & CSS</h3>
    <p>₹499</p>
</div>

<div class="card">
    <img src="https://images.unsplash.com/photo-1515879218367-8466d910aaa4?w=300&h=200&fit=crop" alt="JavaScript Course">
    <h3>JavaScript</h3>
    <p>₹699</p>
</div>

<div class="card">
    <img src="https://images.unsplash.com/photo-1526379095098-d400fd0bf935?w=300&h=200&fit=crop" alt="Python Course">
    <h3>Python</h3>
    <p>₹799</p>
</div>

<div class="card">
    <img src="https://images.unsplash.com/photo-1633356122544-f134324a6cee?w=300&h=200&fit=crop" alt="React JS Course">
    <h3>React JS</h3>
    <p>₹999</p>
</div>
</section>

<section class="contact">
<h2>Contact Us</h2>

<form>
<input type="text" placeholder="Name"><br><br>
<input type="email" placeholder="Email"><br><br>
<textarea placeholder="Message"></textarea><br><br>
<button>Send</button>
</form>

</section>

<footer>
<p>© 2026 Udemy Clone</p>
</footer>

</body>
</html>
